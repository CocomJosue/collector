<div class="principal">
  <mat-card appearance="outlined" class="repeated-section">
    <mat-card-header>
      <mat-card-title>
        Estampas repetidas
      </mat-card-title>
      <mat-card-subtitle>
        Aquí podrás llevar el control de tus estampas repetidas
      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="repeated-content">
        @if(repeatedList.length < 1) {
          <p>Aún no tienes estampas repetidas</p>
        } @else {
          @for(repeatedItem of repeatedList; track $index) {
            <div style="margin-bottom: 10px;">
              <strong>{{ repeatedItem.key }}</strong>
              @for(value of repeatedItem.values; track $index){
                <span>{{ value }}</span>
              }
            </div>
          }
        }
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button routerLink="/">Regresar</button>
      <button mat-flat-button (click)="openDialog()">Agregar</button>
    </mat-card-actions>
  </mat-card>
</div>
